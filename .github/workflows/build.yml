name: Build Unbreakfocus WinUI 3

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore Unbreakfocuspc.csproj -p:Platform=x64

    - name: Publish Standalone App
      run: >
        dotnet publish Unbreakfocuspc.csproj 
        -f net8.0-windows10.0.19041.0 
        -c Release 
        -r win-x64 
        -p:Platform=x64
        --self-contained true
        -v n

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unbreakfocus-Windows-x64
        path: bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\