name: Build Unbreakfocus WinUI 3

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore Unbreakfocuspc.csproj

    - name: Publish Standalone App
      # 🟢 FIX: Changed -r win10-x64 to -r win-x64
      run: >
        dotnet publish Unbreakfocuspc.csproj 
        -f net8.0-windows10.0.19041.0 
        -c Release 
        -r win-x64 
        --self-contained true 
        -p:PublishReadyToRun=true

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unbreakfocus-Windows-x64
        # 🟢 FIX: Path updated to reflect win-x64 folder
        path: bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\