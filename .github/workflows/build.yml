name: Build and Release Unbreakfocus PC
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore
      run: dotnet restore
    - name: Publish
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true -o ./publish
    - name: Zip Artifact
      run: Compress-Archive -Path ./publish/* -DestinationPath ./UnbreakfocusPC.zip
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: UnbreakfocusPC.zip
        tag_name: v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}