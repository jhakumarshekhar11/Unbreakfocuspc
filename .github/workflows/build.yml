name: Build and Publish WinUI 3 App

# This triggers the workflow whenever you push to main, 
# or you can click a button to run it manually.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest # MUST be Windows for WinUI 3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Dependencies
      run: msbuild Unbreakfocuspc.csproj -t:restore -p:Configuration=Release -p:Platform=x64

    - name: Publish App (Bypassing dotnet bug)
      run: msbuild Unbreakfocuspc.csproj -t:Publish -p:Configuration=Release -p:Platform=x64 -p:RuntimeIdentifier=win-x64 -p:WindowsAppSDKSelfContained=true

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: UnbreakfocusPC-Windows-x64
        # The ** tells GitHub to search all subfolders for the publish directory
        path: bin/**/publish/